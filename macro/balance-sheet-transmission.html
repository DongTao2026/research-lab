<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国债发行：资产负债表传导链</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #171b26;
    --surface2: #1e2333;
    --border: #2a3040;
    --accent: #e8c560;
    --accent2: #5b8cff;
    --accent3: #ff6b6b;
    --accent4: #52d9a0;
    --text: #e8eaf0;
    --text-dim: #8892a0;
    --asset: #5b8cff;
    --liability: #ff6b6b;
    --flow: #e8c560;
    --gov: #a78bfa;
    --boj: #38bdf8;
    --bank: #34d399;
    --corp: #fb923c;
    --person: #f472b6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    padding: 36px 40px 24px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gov), var(--boj), var(--bank), var(--corp), var(--person));
  }
  .header-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .subtitle {
    margin-top: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Step nav */
  .step-nav {
    display: flex;
    gap: 0;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .step-nav::-webkit-scrollbar { display: none; }

  .step-btn {
    padding: 14px 20px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    position: relative;
  }
  .step-btn:hover { color: var(--text); }
  .step-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .step-btn .step-num {
    display: inline-block;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface2);
    font-size: 10px;
    line-height: 18px;
    text-align: center;
    margin-right: 6px;
  }
  .step-btn.active .step-num {
    background: var(--accent);
    color: var(--bg);
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: calc(100vh - 140px);
  }

  /* Balance sheet area */
  .bs-area {
    padding: 32px 40px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }

  .step-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .step-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--accent);
  }
  .step-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
    line-height: 1.7;
    max-width: 680px;
  }

  /* BS grid */
  .bs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .bs-card {
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
  }
  .bs-card.highlight {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(232, 197, 96, 0.15);
  }
  .bs-card.changed {
    animation: cardPulse 0.6s ease;
  }
  @keyframes cardPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .bs-card-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  .entity-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .entity-name {
    font-size: 13px;
    font-weight: 500;
    flex: 1;
  }
  .entity-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .bs-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .bs-col {
    padding: 12px 14px;
  }
  .bs-col:first-child {
    border-right: 1px solid var(--border);
  }
  .bs-col-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .bs-col-title.asset { color: var(--asset); }
  .bs-col-title.liab { color: var(--liability); }

  .bs-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    font-size: 12px;
    gap: 8px;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .bs-item-label {
    color: var(--text-dim);
    line-height: 1.4;
    flex: 1;
  }
  .bs-item-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    white-space: nowrap;
  }
  .bs-item.new {
    background: rgba(232, 197, 96, 0.08);
    padding: 5px 6px;
    margin: 0 -6px;
  }
  .bs-item.new .bs-item-label { color: var(--accent); }
  .bs-item.new .bs-item-val { color: var(--accent); }
  .bs-item.up .bs-item-val::before { content: '↑ '; color: var(--accent4); }
  .bs-item.down .bs-item-val::before { content: '↓ '; color: var(--accent3); }
  .bs-item.highlight-red .bs-item-label { color: var(--accent3); }
  .bs-item.highlight-green .bs-item-label { color: var(--accent4); }

  /* Flow arrows */
  .flow-panel {
    padding: 20px 40px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: none;
  }
  .flow-panel.visible { display: block; }
  .flow-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .flow-chain {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .flow-node {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }
  .flow-arrow {
    font-size: 16px;
    color: var(--flow);
  }
  .flow-label {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 10px;
    background: var(--surface2);
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* Sidebar */
  .sidebar {
    padding: 28px 24px;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 28px;
  }
  .sidebar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Key insight */
  .insight {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .insight p {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  .insight strong {
    color: var(--accent);
  }

  /* Effects list */
  .effect-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    line-height: 1.6;
  }
  .effect-item:last-child { border-bottom: none; }
  .effect-icon {
    width: 20px; height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .effect-icon.pos { background: rgba(82, 217, 160, 0.15); color: var(--accent4); }
  .effect-icon.neg { background: rgba(255, 107, 107, 0.15); color: var(--accent3); }
  .effect-icon.neu { background: rgba(232, 197, 96, 0.15); color: var(--accent); }

  .effect-text { color: var(--text-dim); }
  .effect-text strong { color: var(--text); }

  /* Progress */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  /* Navigation buttons */
  .nav-buttons {
    display: flex;
    gap: 10px;
    padding: 20px 40px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .nav-btn {
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    transition: all 0.2s;
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .nav-btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .nav-btn.primary:hover:not(:disabled) {
    background: #f0d070;
    color: var(--bg);
  }

  .spacer { flex: 1; }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .legend-box {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* Stock impact panel */
  .impact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .impact-card {
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .impact-sector {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .impact-dir {
    font-size: 13px;
    font-weight: 600;
  }
  .impact-dir.pos { color: var(--accent4); }
  .impact-dir.neg { color: var(--accent3); }
  .impact-dir.neu { color: var(--accent); }

  /* Fade transition */
  .fade-enter { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Separator line in BS */
  .bs-sep {
    grid-column: 1 / -1;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .bs-total {
    display: flex;
    justify-content: space-between;
    padding: 6px 0 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .bs-total.asset { color: var(--asset); }
  .bs-total.liab { color: var(--liability); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-top: 1px solid var(--border); }
    .bs-area { border-right: none; }
    header, .step-nav, .bs-area, .nav-buttons { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>

<header>

  <h1>国债发行的资产负债表传导链</h1>

<div class="step-nav" id="stepNav"></div>

<div class="main">

    <div id="bsContent"></div>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<div class="nav-buttons">

          { label: "银行净资产（侵蚀）", val: "100T¥", cls: "down" },
        ]
      },
      {
        name: "企业部门",
        tag: "Corporate Sector ⚠️",
        color: "var(--corp)",
        highlight: true,
        assets: [
          { label: "现金 / 银行存款", val: "360T¥" },
          { label: "实物资产（估值下降）", val: "500T¥", cls: "down" },
        ],
        liabs: [
          { label: "银行贷款（利率上升）", val: "500T¥", cls: "highlight-red" },
          { label: "利息负担加重", val: "↑成本上升", cls: "highlight-red" },
          { label: "企业净资产（收缩）", val: "280T¥", cls: "down" },
        ]
      },
      {
        name: "个人 / 家庭",
        tag: "Household ⚠️",
        color: "var(--person)",
        highlight: true,
        assets: [
          { label: "银行存款", val: "740T¥" },
          { label: "股票 / 投信（下跌）", val: "240T¥", cls: "down" },
          { label: "不动产（调整）", val: "520T¥", cls: "down" },
        ],
        liabs: [
          { label: "住宅贷款（利率重定价）", val: "150T¥", cls: "highlight-red" },
          { label: "消费贷款", val: "50T¥" },
          { label: "家庭净资产（回落）", val: "1,310T¥", cls: "down" },
        ]
      }
    ],
    insight: {
      title: "明斯基时刻风险",
      text: "当<strong>国债收益率急升</strong>：① BOJ持债浮亏 → 净资产侵蚀；② 商业银行资本充足率下降 → 信贷收缩；③ 企业利息成本↑ → EPS下降 → 股价下跌。链条<strong>逆向运行</strong>。"
    },
    effects: [
      { icon: "neg", text: "<strong>国债收益率↑</strong>：折现率上升 → 股票估值收缩（P/E压缩）" },
      { icon: "neg", text: "<strong>银行资本压力</strong>：国债浮亏侵蚀资本 → 被迫缩表" },
      { icon: "neg", text: "<strong>企业融资成本↑</strong>：EPS下降 + 估值收缩 = 双杀" },
      { icon: "neg", text: "<strong>日元汇率风险</strong>：若货币失信，外资撤离加速恶化" },
      { icon: "pos", text: "<strong>银行股短期受益</strong>：存款净息差扩大（但持债损失需对冲）" },
    ]
  }
];

let currentStep = 0;

function renderStepNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = STEPS.map((s, i) => `
    <button class="step-btn ${i === currentStep ? 'active' : ''}" onclick="goToStep(${i})">
      <span class="step-num">${i}</span>${s.tag}
    </button>
  `).join('');
}

function renderBS(entities) {
  return entities.map(e => `
    <div class="bs-card ${e.highlight ? 'highlight' : ''} ${e.highlight ? 'changed' : ''}">
      <div class="bs-card-header">
        <div class="entity-dot" style="background:${e.color}"></div>
        <div class="entity-name" style="color:${e.color}">${e.name}</div>
        <div class="entity-tag">${e.tag}</div>
      </div>
      <div class="bs-body">
        <div class="bs-col">
          <div class="bs-col-title asset">ASSETS 资产</div>
          ${e.assets.map(a => `
            <div class="bs-item ${a.cls || ''}">
              <div class="bs-item-label">${a.label}</div>
              <div class="bs-item-val">${a.val}</div>
            </div>
          `).join('')}
        </div>
        <div class="bs-col">
          <div class="bs-col-title liab">LIABILITIES 负债 + 净资产</div>
          ${e.liabs.map(l => `
            <div class="bs-item ${l.cls || ''}">
              <div class="bs-item-label">${l.label}</div>
              <div class="bs-item-val">${l.val}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderSidebar(step) {
  const total = STEPS.length;
  let stockImpact = '';
  if (step.id >= 3) {
    stockImpact = `
      <div class="sidebar-section">
        <div class="sidebar-title">STOCK MARKET IMPACT</div>
        <div class="impact-grid">
          <div class="impact-card">
            <div class="impact-sector">出口制造业</div>
            <div class="impact-dir ${step.id === 6 ? 'neg' : 'pos'}">${step.id === 6 ? '↓ 利空' : '↑ 利多'}</div>
          </div>
          <div class="impact-card">
            <div class="impact-sector">银行板块</div>
            <div class="impact-dir ${step.id === 6 ? 'pos' : 'neg'}">${step.id === 6 ? '↑ 息差扩大' : '↓ 息差压缩'}</div>
          </div>
          <div class="impact-card">
            <div class="impact-sector">建设/基建</div>
            <div class="impact-dir ${step.id === 3 || step.id === 4 ? 'pos' : 'neu'}">${step.id === 3 || step.id === 4 ? '↑ 受益' : '→ 中性'}</div>
          </div>
          <div class="impact-card">
            <div class="impact-sector">成长/科技股</div>
            <div class="impact-dir ${step.id === 6 ? 'neg' : 'pos'}">${step.id === 6 ? '↓ 估值压缩' : '↑ 低利率受益'}</div>
          </div>
        </div>
      </div>
    `;
  }

  return `
    <div class="sidebar-section">
      <div class="sidebar-title">KEY INSIGHT</div>
      <div class="insight">
        <p><strong>${step.insight.title}</strong><br>${step.insight.text}</p>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">EFFECTS ON ECONOMY</div>
      ${step.effects.map(e => `
        <div class="effect-item">
          <div class="effect-icon ${e.icon}">${e.icon === 'pos' ? '↑' : e.icon === 'neg' ? '↓' : '→'}</div>
          <div class="effect-text">${e.text}</div>
        </div>
      `).join('')}
    </div>
    ${stockImpact}
  `;
}

function renderStep(step) {
  const progress = ((step.id + 1) / STEPS.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  document.getElementById('bsContent').innerHTML = `
    <div class="fade-enter">
      <div class="step-title">
        ${step.title}
        <span class="step-tag">${step.tag}</span>
      </div>
      <p class="step-desc">${step.desc}</p>
      <div class="bs-grid">
        ${renderBS(step.entities)}
      </div>
    </div>
  `;

  document.getElementById('sidebar').innerHTML = renderSidebar(step);

  document.getElementById('stepCounter').textContent = `${step.id + 1} / ${STEPS.length}`;

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = step.id === 0;
  nextBtn.disabled = step.id === STEPS.length - 1;
  if (step.id === STEPS.length - 1) {
    nextBtn.textContent = '已完成 ✓';
  } else {
    nextBtn.textContent = '下一步 →';
  }
}

function goToStep(i) {
  currentStep = i;
  renderStepNav();
  renderStep(STEPS[i]);
  document.querySelector('.bs-area').scrollTop = 0;
}

function changeStep(dir) {
  const next = currentStep + dir;
  if (next >= 0 && next < STEPS.length) {
    goToStep(next);
  }
}

// Init
renderStepNav();
renderStep(STEPS[0]);
</script>
